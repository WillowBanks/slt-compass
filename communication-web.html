// BUILD EDGES + COMPUTE DEGREE
// ============================================================
const edges=[];
const byTitle={};
N.forEach(n=>{byTitle[n.t]=n; n.deg=0; n.vx=0; n.vy=0;});
N.forEach(n=>{
    n.r.forEach(rt=>{
        const target=byTitle[rt];
        if(target && !edges.find(e=>(e.a===n&&e.b===target)||(e.a===target&&e.b===n))){
            edges.push({a:n,b:target});
            n.deg++; target.deg++;
        }
    });
});
// Node radius based on degree (hub nodes bigger)
N.forEach(n=>{
    if(n.c==='diagnosis') n.radius = 18 + Math.sqrt(n.deg) * 6;
    else n.radius = 6 + Math.sqrt(n.deg) * 3;
});

// ============================================================
// FORCE-DIRECTED LAYOUT (Velocity Verlet)
// ============================================================
function forceLayout(nodes, edges, iterations) {
    const W=2400, H=1800;
    // Initial positions — random
    let seed=7;
    function rng(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646;}
    nodes.forEach(n=>{n.x=W*0.1+rng()*W*0.8; n.y=H*0.1+rng()*H*0.8;});

    const linkDist=180, linkStr=0.06;
    const charge=-2000;
    const centerStr=0.005;
    const cx=W/2, cy=H/2;
    const decay=0.85;

    for(let iter=0;iter<iterations;iter++){
        const alpha=1-iter/iterations;

        // Repulsion (all pairs — O(n²) fine for 108 nodes)
        for(let i=0;i<nodes.length;i++){
            for(let j=i+1;j<nodes.length;j++){
                const a=nodes[i],b=nodes[j];
                let dx=b.x-a.x, dy=b.y-a.y;
                let d2=dx*dx+dy*dy;
                if(d2<1) d2=1;
                const d=Math.sqrt(d2);
                const f=charge*alpha/d2;
                const fx=f*dx/d, fy=f*dy/d;
                a.vx-=fx; a.vy-=fy;
                b.vx+=fx; b.vy+=fy;
            }
        }

        // Link attraction
        edges.forEach(e=>{
            const dx=e.b.x-e.a.x, dy=e.b.y-e.a.y;
            const d=Math.sqrt(dx*dx+dy*dy)||1;
            const f=(d-linkDist)*linkStr*alpha;
            const fx=f*dx/d, fy=f*dy/d;
            e.a.vx+=fx; e.a.vy+=fy;
            e.b.vx-=fx; e.b.vy-=fy;
        });

        // Centre gravity
        nodes.forEach(n=>{
            n.vx+=(cx-n.x)*centerStr*alpha;
            n.vy+=(cy-n.y)*centerStr*alpha;
        });

        // Integrate
        nodes.forEach(n=>{
            n.vx*=decay; n.vy*=decay;
            n.x+=n.vx; n.y+=n.vy;
        });
    }

    // Collision resolution pass
    for(let pass=0;pass<20;pass++){
        let moved=false;
        for(let i=0;i<nodes.length;i++){
            for(let j=i+1;j<nodes.length;j++){
                const a=nodes[i],b=nodes[j];
                const dx=b.x-a.x, dy=b.y-a.y;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                const minD=a.radius+b.radius+8;
                if(d<minD){
                    const push=(minD-d)/2+1;
                    const nx=dx/d, ny=dy/d;
                    a.x-=nx*push; a.y-=ny*push;
                    b.x+=nx*push; b.y+=ny*push;
                    moved=true;
                }
            }
        }
        if(!moved) break;
    }
}

forceLayout(N, edges, 500);

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let ox=0, oy=0, sc=1.0, dragging=false, dx0=0, dy0=0;
let hovered=null, selected=null;

function resize(){
    const dpr=devicePixelRatio||1;
    canvas.width=innerWidth*dpr; canvas.height=innerHeight*dpr;
    canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    if(ox===0&&oy===0){
        // Centre the graph
        let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
        N.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x);maxY=Math.max(maxY,n.y);});
        const gcx=(minX+maxX)/2, gcy=(minY+maxY)/2;
        ox=innerWidth/2-gcx*sc; oy=innerHeight/2-gcy*sc;
    }
}

function w2s(wx,wy){return{x:wx*sc+ox,y:wy*sc+oy}}
function s2w(sx,sy){return{x:(sx-ox)/sc,y:(sy-oy)/sc}}

// Events
canvas.addEventListener('mousedown',e=>{dragging=true;dx0=e.clientX;dy0=e.clientY;canvas.classList.add('grabbing')});
addEventListener('mousemove',e=>{
    if(dragging){ox+=e.clientX-dx0;oy+=e.clientY-dy0;dx0=e.clientX;dy0=e.clientY;}
    const wp=s2w(e.clientX,e.clientY);
    hovered=null;
    for(let i=N.length-1;i>=0;i--){
        const n=N[i],dx=wp.x-n.x,dy=wp.y-n.y;
        if(dx*dx+dy*dy<n.radius*n.radius){hovered=N[i];break;}
    }
    canvas.style.cursor=hovered?'pointer':(dragging?'grabbing':'grab');
});
addEventListener('mouseup',()=>{dragging=false;canvas.classList.remove('grabbing')});

canvas.addEventListener('click',e=>{
    if(hovered){showPop(hovered,e.clientX,e.clientY);}
    else hidePop();
});

canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const mx=e.clientX,my=e.clientY;
    const before=s2w(mx,my);
    const delta=e.deltaY>0?-0.3:0.3; // very fast zoom
    sc=Math.max(0.05,Math.min(6,sc*(1+delta)));
    const after=s2w(mx,my);
    ox+=(after.x-before.x)*sc; oy+=(after.y-before.y)*sc;
    document.getElementById('zl').textContent=Math.round(sc*100)+'%';
},{passive:false});

// Touch
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;dx0=e.touches[0].clientX;dy0=e.touches[0].clientY;}});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&dragging){ox+=e.touches[0].clientX-dx0;oy+=e.touches[0].clientY-dy0;dx0=e.touches[0].clientX;dy0=e.touches[0].clientY;}},{passive:false});
canvas.addEventListener('touchend',()=>{dragging=false;});

// Zoom buttons
document.getElementById('zi').addEventListener('click',()=>{
    const b=s2w(innerWidth/2,innerHeight/2);sc=Math.min(6,sc*1.5);const a=s2w(innerWidth/2,innerHeight/2);ox+=(a.x-b.x)*sc;oy+=(a.y-b.y)*sc;document.getElementById('zl').textContent=Math.round(sc*100)+'%';
});
document.getElementById('zo').addEventListener('click',()=>{
    const b=s2w(innerWidth/2,innerHeight/2);sc=Math.max(0.05,sc/1.5);const a=s2w(innerWidth/2,innerHeight/2);ox+=(a.x-b.x)*sc;oy+=(a.y-b.y)*sc;document.getElementById('zl').textContent=Math.round(sc*100)+'%';
});

// Popup
function showPop(node,sx,sy){
    const p=document.getElementById('pop');
    p.querySelector('.pt').textContent=node.t;
    const b=p.querySelector('.pb');b.textContent=node.c;b.className='pb '+node.c;
    p.querySelector('.pd').textContent=node.d;
    const rc=p.querySelector('.pr');rc.innerHTML='';
    node.r.forEach(rt=>{
        const pill=document.createElement('div');pill.className='rp';pill.textContent=rt;
        pill.addEventListener('click',()=>{
            const rn=byTitle[rt];
            if(rn){sc=0.6;ox=innerWidth/2-rn.x*sc;oy=innerHeight/2-rn.y*sc;showPop(rn,innerWidth/2,innerHeight/2);document.getElementById('zl').textContent=Math.round(sc*100)+'%';}
        });
        rc.appendChild(pill);
    });
    p.querySelector('.ob').onclick=()=>{window.open('communication-compass-v29.html#term='+encodeURIComponent(node.t),'_blank');};
    p.classList.add('v');
    p.style.left=Math.max(12,Math.min(sx+16,innerWidth-380))+'px';
    p.style.top=Math.max(12,Math.min(sy-80,innerHeight-340))+'px';
    selected=node;
}
function hidePop(){document.getElementById('pop').classList.remove('v');selected=null;}
document.querySelector('.pc').addEventListener('click',hidePop);

// ============================================================
// DRAW
// ============================================================
function draw(){
    const W=innerWidth, H=innerHeight;
    ctx.clearRect(0,0,W,H);

    // Background
    ctx.fillStyle='#0d1117';
    ctx.fillRect(0,0,W,H);

    // ---- EDGES ----
    // Always draw ALL edges as thin lines (neural net effect)
    const edgeBaseAlpha = Math.min(0.25, sc * 0.4);
    edges.forEach(e=>{
        const a=w2s(e.a.x,e.a.y), b=w2s(e.b.x,e.b.y);
        // Cull if both off-screen
        if((a.x<-50&&b.x<-50)||(a.x>W+50&&b.x>W+50)||(a.y<-50&&b.y<-50)||(a.y>H+50&&b.y>H+50)) return;

        const isHL=(e.a===hovered||e.a===selected||e.b===hovered||e.b===selected);
        const col=COL[e.a.c==='diagnosis'?e.a.c:e.b.c==='diagnosis'?e.b.c:e.a.c];

        if(isHL){
            ctx.strokeStyle=col;
            ctx.globalAlpha=0.6;
            ctx.lineWidth=1.5;
        } else {
            ctx.strokeStyle=col;
            ctx.globalAlpha=edgeBaseAlpha;
            ctx.lineWidth=0.5;
        }

        // Curved line (quadratic bezier through midpoint offset)
        const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
        const dx=b.x-a.x, dy=b.y-a.y;
        const len=Math.sqrt(dx*dx+dy*dy);
        const curve=Math.min(len*0.15, 30);
        const cpx=mx+(-dy/len)*curve, cpy=my+(dx/len)*curve;

        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.quadraticCurveTo(cpx,cpy,b.x,b.y);
        ctx.stroke();
        ctx.globalAlpha=1;
    });

    // ---- NODES ----
    // Sort so diagnoses render last (on top)
    const sorted=[...N].sort((a,b)=>(a.c==='diagnosis'?1:0)-(b.c==='diagnosis'?1:0));

    sorted.forEach(n=>{
        const sp=w2s(n.x,n.y);
        const r=n.radius*sc;

        // Cull
        if(sp.x<-r*2||sp.x>W+r*2||sp.y<-r*2||sp.y>H+r*2) return;

        const isHL=(n===hovered||n===selected);
        const col=COL[n.c];

        // Too tiny — just a dot
        if(r<2){
            ctx.fillStyle=col;
            ctx.globalAlpha=0.5;
            ctx.beginPath();ctx.arc(sp.x,sp.y,Math.max(1,r),0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=1;
            return;
        }

        // Glow for highlighted
        if(isHL){
            ctx.shadowBlur=r*1.5;
            ctx.shadowColor=col;
        }

        // Fill
        ctx.fillStyle=isHL?(col+'50'):COL_DIM[n.c];
        ctx.strokeStyle=col;
        ctx.lineWidth=isHL?2:1;

        ctx.beginPath();
        ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur=0;

        // Label
        if(r>8){
            const fs=Math.max(7,Math.min(14,r*0.55));
            ctx.font=`${n.c==='diagnosis'?600:500} ${fs}px Inter,system-ui,sans-serif`;
            ctx.fillStyle='#fff';
            ctx.textAlign='center';
            ctx.textBaseline='middle';

            // Word wrap for diagnoses when big enough
            if(r>25 && n.c==='diagnosis'){
                const words=n.t.split(' ');
                const lines=[];
                let line='';
                words.forEach(w=>{
                    const test=line?line+' '+w:w;
                    if(ctx.measureText(test).width>r*1.7&&line){lines.push(line);line=w;}
                    else line=test;
                });
                if(line) lines.push(line);
                const lh=fs*1.2;
                const startY=sp.y-((lines.length-1)*lh)/2;
                lines.forEach((l,li)=>{ctx.fillText(l,sp.x,startY+li*lh);});
            } else {
                let label=n.t;
                const maxW=r*1.8;
                if(ctx.measureText(label).width>maxW){
                    while(label.length>3&&ctx.measureText(label+'…').width>maxW) label=label.slice(0,-1);
                    label+='…';
                }
                ctx.fillText(label,sp.x,sp.y);
            }
        }
    });

    requestAnimationFrame(draw);
}

resize();
addEventListener('resize',resize);
draw();
setTimeout(()=>document.getElementById('hint').classList.add('h'),4000);
</script>
