<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SLT Knowledge Graph — Chord Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a1a;
  --bg-edge: #0d1117;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text: #e6edf3;
  --text-muted: rgba(255,255,255,0.5);
  --diag: #e74c8b;
  --assess: #4da6ff;
  --interv: #34d399;
  --accent: #7B2FF7;
  --shadow: 0 8px 32px rgba(123,47,247,0.08);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
}

body {
  background: radial-gradient(circle at 50% 50%, var(--bg) 0%, var(--bg-edge) 100%);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(123,47,247,0.05) 0%, transparent 50%),
              radial-gradient(circle at 70% 70%, rgba(52,211,153,0.03) 0%, transparent 50%);
  animation: gradientShift 20s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes gradientShift {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}

/* ============================================================
   LOADING SCREEN
   ============================================================ */
#loading {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg-edge) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.5s ease;
}

#loading.hide {
  opacity: 0;
  pointer-events: none;
}

#loading h1 {
  font-family: 'Poppins', sans-serif;
  font-size: 2.5rem;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 1rem;
}

#loading p {
  font-size: 1rem;
  color: var(--text-muted);
  margin-bottom: 2rem;
}

.loading-dots {
  display: flex;
  gap: 0.5rem;
}

.loading-dots span {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.4s infinite ease-in-out;
}

.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ============================================================
   HEADER BAR
   ============================================================ */
#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 100;
  box-shadow: var(--shadow);
}

#header-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

#header-search {
  position: relative;
  flex: 0 0 400px;
}

#search {
  width: 100%;
  height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 1rem 0 3rem;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  transition: var(--transition);
}

#search:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface-hover);
}

#search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  opacity: 0.5;
}

#search-count {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: var(--text-muted);
}

#header-filters {
  display: flex;
  gap: 0.75rem;
}

.filter-pill {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text);
}

.filter-pill:hover {
  background: var(--surface-hover);
  transform: translateY(-1px);
}

.filter-pill.active {
  border-color: var(--accent);
  background: rgba(123,47,247,0.1);
}

.filter-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  transition: var(--transition);
}

.filter-pill[data-cat="diagnosis"] .filter-dot { background: var(--diag); }
.filter-pill[data-cat="assessment"] .filter-dot { background: var(--assess); }
.filter-pill[data-cat="intervention"] .filter-dot { background: var(--interv); }

/* ============================================================
   STATS BAR
   ============================================================ */
#stats-bar {
  position: fixed;
  top: 96px;
  left: 2rem;
  right: 2rem;
  height: 80px;
  display: flex;
  gap: 1rem;
  z-index: 90;
}

.stat-card {
  flex: 1;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1rem 1.5rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.stat-label {
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-value {
  font-family: 'Poppins', sans-serif;
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text);
}

/* ============================================================
   CANVAS CONTAINER
   ============================================================ */
#container {
  position: fixed;
  inset: 0;
  padding-top: 192px;
  padding-bottom: 60px;
}

#canvas {
  display: block;
  cursor: default;
}

/* ============================================================
   LEGEND (bottom-left)
   ============================================================ */
#legend {
  position: fixed;
  bottom: 76px;
  left: 2rem;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
  z-index: 80;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
  font-size: 0.875rem;
}

.legend-item:last-child {
  margin-bottom: 0;
}

.legend-color {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.legend-hint {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ============================================================
   TOOLTIP (hover)
   ============================================================ */
#tooltip {
  position: fixed;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1rem 1.25rem;
  max-width: 360px;
  box-shadow: var(--shadow);
  opacity: 0;
  pointer-events: none;
  z-index: 200;
  transition: opacity 0.2s ease;
}

#tooltip.show {
  opacity: 1;
}

#tooltip-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text);
}

#tooltip-badge {
  display: inline-block;
  padding: 0.25rem 0.75rem;
  border-radius: 24px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.75rem;
}

#tooltip-badge.diagnosis { background: rgba(231,76,139,0.2); color: var(--diag); }
#tooltip-badge.assessment { background: rgba(77,166,255,0.2); color: var(--assess); }
#tooltip-badge.intervention { background: rgba(52,211,153,0.2); color: var(--interv); }

#tooltip-desc {
  font-size: 0.85rem;
  line-height: 1.5;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

#tooltip-connections {
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* ============================================================
   DETAIL PANEL (click)
   ============================================================ */
#detail-panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 400px;
  height: 100%;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 32px rgba(0,0,0,0.3);
  z-index: 150;
  transition: right var(--transition);
  overflow-y: auto;
}

#detail-panel.open {
  right: 0;
}

#detail-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 32px;
  height: 32px;
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

#detail-close:hover {
  background: var(--surface);
  border-color: var(--accent);
}

#detail-content {
  padding: 2rem;
}

#detail-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: var(--text);
  line-height: 1.3;
}

#detail-badge {
  display: inline-block;
  padding: 0.4rem 1rem;
  border-radius: 24px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 1.5rem;
}

#detail-badge.diagnosis { background: rgba(231,76,139,0.2); color: var(--diag); }
#detail-badge.assessment { background: rgba(77,166,255,0.2); color: var(--assess); }
#detail-badge.intervention { background: rgba(52,211,153,0.2); color: var(--interv); }

#detail-desc {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-muted);
  margin-bottom: 2rem;
}

#detail-related-title {
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: var(--text);
}

#detail-related-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 2rem;
}

.related-pill {
  padding: 0.5rem 1rem;
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: 24px;
  font-size: 0.8rem;
  color: var(--text);
  cursor: pointer;
  transition: var(--transition);
}

.related-pill:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

#detail-compass-btn {
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
  border: none;
  border-radius: 10px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 16px rgba(123,47,247,0.3);
}

#detail-compass-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(123,47,247,0.4);
}

/* ============================================================
   BOTTOM BAR
   ============================================================ */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 100;
  font-size: 0.8rem;
  color: var(--text-muted);
}

#bottom-status {
  display: flex;
  gap: 2rem;
}

#bottom-hints {
  display: flex;
  gap: 1.5rem;
}

.hint-key {
  display: inline-block;
  padding: 0.25rem 0.5rem;
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  margin-right: 0.5rem;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  #header {
    flex-direction: column;
    height: auto;
    padding: 1rem;
    gap: 0.75rem;
  }

  #header-search {
    flex: 1;
    width: 100%;
  }

  #header-filters {
    width: 100%;
    justify-content: space-between;
  }

  #stats-bar {
    top: 140px;
    flex-wrap: wrap;
  }

  .stat-card {
    flex: 0 0 calc(50% - 0.5rem);
  }

  #container {
    padding-top: 300px;
  }

  #detail-panel {
    width: 100%;
    right: -100%;
  }
}
</style>
</head>
<body>

<!-- ============================================================
     LOADING SCREEN

<div id="loading">

  <p>Chord Diagram \u2014 Relationship Flows</p>

    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- ============================================================
     HEADER BAR

</div>

<!-- ============================================================
     STATS BAR
     ============================================================ -->
<div id="stats-bar">
  <div class="stat-card">
    <div class="stat-label">Total Nodes</div>

  <div class="stat-card">

</div>

<!-- ============================================================
     CANVAS CONTAINER
     ============================================================ -->
<div id="container">
  <canvas id="canvas"></canvas>
</div>

<!-- ============================================================
     LEGEND
     ============================================================ -->
<div id="legend">
  <div class="legend-item">
    <div class="legend-color" style="background:var(--diag);"></div>
    <span id="legend-diagnosis">Diagnoses: 22</span>

  <div class="legend-item">

</div>

<!-- ============================================================
     TOOLTIP
     ============================================================ -->
<div id="tooltip">
  <div id="tooltip-title"></div>
  <div id="tooltip-badge"></div>
  <div id="tooltip-desc"></div>
  <div id="tooltip-connections"></div>
</div>

<!-- ============================================================
     DETAIL PANEL
     ============================================================ -->
<div id="detail-panel">
  <div id="detail-close">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </div>
  <div id="detail-content">
    <div id="detail-title"></div>
    <div id="detail-badge"></div>
    <div id="detail-desc"></div>
    <div id="detail-related-title"></div>
    <div id="detail-related-list"></div>
    <button id="detail-compass-btn">Open in Communication Compass</button>
  </div>
</div>

<!-- ============================================================
     BOTTOM BAR
     ============================================================ -->
<div id="bottom-bar">
  <div id="bottom-status">
    <span id="status-visible"></span>
    <span id="status-connections"></span>
  </div>
  <div id="bottom-hints">
    <span><span class="hint-key">R</span>Reset filters</span>
    <span><span class="hint-key">F</span>Fullscreen</span>
    <span><span class="hint-key">1/2/3</span>Toggle categories</span>
    <span><span class="hint-key">Esc</span>Close panel</span>
  </div>
</div>

// ============================================================
// BUILD EDGES + COMPUTE DEGREE
// ============================================================
const nodeMap = new Map();
N.forEach(n => {
  n.deg = 0;
  n.edges = [];
  nodeMap.set(n.t, n);
});

// Build edges
N.forEach(src => {
  src.r.forEach(tName => {
    const tgt = nodeMap.get(tName);
    if (tgt) {
      src.edges.push(tgt);
      src.deg++;
      tgt.deg++;
    }
  });
});

// Filter connected nodes only
const connected = N.filter(n => n.deg > 0);

// Group by category
const groups = {
  diagnosis: connected.filter(n => n.c === 'diagnosis'),
  assessment: connected.filter(n => n.c === 'assessment'),
  intervention: connected.filter(n => n.c === 'intervention')
};

// Category colours
const catColors = {
  diagnosis: '#e74c8b',
  assessment: '#4da6ff',
  intervention: '#34d399'
};

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 2;

let W, H, cx, cy, radius, ringThickness;

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight - 192 - 60; // Account for header, stats, bottom bar
  cx = W / 2;
  cy = H / 2;
  radius = Math.min(W, H) * 0.35;
  ringThickness = radius * 0.08;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  layoutNodes();
  draw();
}

window.addEventListener('resize', resizeCanvas);

// ============================================================
// LAYOUT — COMPUTE ARC POSITIONS
// ============================================================
let arcs = [];
const categoryGap = 5 * Math.PI / 180; // 5 degrees
const nodeGap = 0.5 * Math.PI / 180; // 0.5 degrees

function layoutNodes() {
  arcs = [];

  // Calculate total degree for proportional sizing
  const totalDeg = connected.reduce((sum, n) => sum + n.deg, 0);

  // Available angle space (360 - 3 category gaps)
  const availableAngle = 2 * Math.PI - 3 * categoryGap;

  let currentAngle = -Math.PI / 2; // Start at top

  ['diagnosis', 'assessment', 'intervention'].forEach(cat => {
    const catNodes = groups[cat];
    if (catNodes.length === 0) return;

    catNodes.forEach((node, i) => {
      const nodeAngle = (node.deg / totalDeg) * availableAngle;
      const startAngle = currentAngle;
      const endAngle = currentAngle + nodeAngle;
      const midAngle = (startAngle + endAngle) / 2;

      // Store arc data
      arcs.push({
        node,
        startAngle,
        endAngle,
        midAngle,
        x: cx + radius * Math.cos(midAngle),
        y: cy + radius * Math.sin(midAngle),
        color: catColors[cat]
      });

      currentAngle = endAngle + nodeGap;
    });

    currentAngle += categoryGap - nodeGap; // Add category gap
  });
}

// ============================================================
// STATE
// ============================================================
let hoveredArc = null;
let selectedArc = null;
let activeFilters = new Set(['diagnosis', 'assessment', 'intervention']);
let searchTerm = '';
let animationProgress = 0;

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Filter visible arcs
  const visibleArcs = arcs.filter(a =>
    activeFilters.has(a.node.c) &&
    (!searchTerm || a.node.t.toLowerCase().includes(searchTerm.toLowerCase()))
  );

  // Draw chords first (behind everything)
  drawChords(visibleArcs);

  // Draw arc segments
  visibleArcs.forEach(arc => {
    const isHovered = arc === hoveredArc;
    const isSelected = arc === selectedArc;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, arc.startAngle, arc.endAngle);
    ctx.arc(cx, cy, radius + ringThickness, arc.endAngle, arc.startAngle, true);
    ctx.closePath();

    // Base fill
    ctx.fillStyle = arc.color;
    ctx.fill();

    // Glow on hover
    if (isHovered || isSelected) {
      ctx.shadowColor = arc.color;
      ctx.shadowBlur = 20;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Draw labels
  drawLabels(visibleArcs);
}

function drawChords(visibleArcs) {
  const edges = [];

  // Build edge list
  visibleArcs.forEach(srcArc => {
    srcArc.node.edges.forEach(tgtNode => {
      const tgtArc = visibleArcs.find(a => a.node === tgtNode);
      if (tgtArc && srcArc.node.i < tgtNode.i) { // Avoid duplicates
        edges.push({ src: srcArc, tgt: tgtArc });
      }
    });
  });

  // Draw chords
  edges.forEach(edge => {
    const isHighlighted = hoveredArc &&
      (edge.src === hoveredArc || edge.tgt === hoveredArc);

    const alpha = isHighlighted ? 0.6 : (hoveredArc ? 0.03 : 0.15);

    const x1 = cx + radius * Math.cos(edge.src.midAngle);
    const y1 = cy + radius * Math.sin(edge.src.midAngle);
    const x2 = cx + radius * Math.cos(edge.tgt.midAngle);
    const y2 = cy + radius * Math.sin(edge.tgt.midAngle);

    // Blend colors
    const c1 = hexToRgb(edge.src.color);
    const c2 = hexToRgb(edge.tgt.color);
    const blended = `rgba(${Math.round((c1.r + c2.r) / 2)},${Math.round((c1.g + c2.g) / 2)},${Math.round((c1.b + c2.b) / 2)},${alpha})`;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cx, cy, x2, y2);
    ctx.strokeStyle = blended;
    ctx.lineWidth = isHighlighted ? 3 : 1.5;
    ctx.stroke();
  });
}

function drawLabels(visibleArcs) {
  ctx.font = '11px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Label collision detection — simple version
  const drawnAngles = [];
  const minAngleDist = 0.15; // radians

  visibleArcs.forEach(arc => {
    const angle = arc.midAngle;

    // Skip if too close to another label
    const tooClose = drawnAngles.some(a => Math.abs(a - angle) < minAngleDist);
    if (tooClose) return;

    drawnAngles.push(angle);

    const labelRadius = radius + ringThickness + 18;
    const x = cx + labelRadius * Math.cos(angle);
    const y = cy + labelRadius * Math.sin(angle);

    ctx.save();
    ctx.translate(x, y);

    // Rotate text to follow circle
    let textAngle = angle;
    if (angle > Math.PI / 2 && angle < 3 * Math.PI / 2) {
      textAngle += Math.PI; // Flip text on left side
    }
    ctx.rotate(textAngle);

    ctx.fillStyle = arc === hoveredArc ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.fillText(truncate(arc.node.t, 28), 0, 0);
    ctx.restore();
  });
}

function truncate(str, maxLen) {
  return str.length > maxLen ? str.substring(0, maxLen - 1) + '\u2026' : str;
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : { r: 255, g: 255, b: 255 };
}

// ============================================================
// INTERACTIONS — CANVAS
// ============================================================
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const dx = mx - cx;
  const dy = my - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx);

  let found = null;
  if (dist >= radius && dist <= radius + ringThickness) {
    found = arcs.find(arc => {
      let a = angle;
      if (a < arc.startAngle) a += 2 * Math.PI;
      return a >= arc.startAngle && a <= arc.endAngle;
    });
  }

  if (found !== hoveredArc) {
    hoveredArc = found;
    draw();

    if (hoveredArc) {
      showTooltip(hoveredArc, e.clientX, e.clientY);
    } else {
      hideTooltip();
    }
  } else if (hoveredArc) {
    // Update tooltip position
    tooltip.style.left = (e.clientX + 20) + 'px';
    tooltip.style.top = (e.clientY + 20) + 'px';
  }

  canvas.style.cursor = hoveredArc ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => {
  if (hoveredArc && !selectedArc) {
    hoveredArc = null;
    draw();
  }
  hideTooltip();
});

canvas.addEventListener('click', e => {
  if (hoveredArc) {
    showDetailPanel(hoveredArc);
  }
});

function showTooltip(arc, x, y) {
  const node = arc.node;

  document.getElementById('tooltip-title').textContent = node.t;
  document.getElementById('tooltip-badge').textContent = node.c;
  document.getElementById('tooltip-badge').className = node.c;
  document.getElementById('tooltip-desc').textContent = node.d;
  document.getElementById('tooltip-connections').textContent = `${node.edges.length} connection${node.edges.length === 1 ? '' : 's'}`;

  tooltip.style.left = (x + 20) + 'px';
  tooltip.style.top = (y + 20) + 'px';
  tooltip.classList.add('show');
}

function hideTooltip() {
  tooltip.classList.remove('show');
}

// ============================================================
// DETAIL PANEL
// ============================================================
const detailPanel = document.getElementById('detail-panel');
const detailClose = document.getElementById('detail-close');

function showDetailPanel(arc) {
  selectedArc = arc;
  const node = arc.node;

  document.getElementById('detail-title').textContent = node.t;
  document.getElementById('detail-badge').textContent = node.c;
  document.getElementById('detail-badge').className = node.c;
  document.getElementById('detail-desc').textContent = node.d;

  const relatedTitle = document.getElementById('detail-related-title');
  relatedTitle.textContent = `Related Items (${node.edges.length})`;

  const relatedList = document.getElementById('detail-related-list');
  relatedList.innerHTML = '';

  node.edges.forEach(relNode => {
    const pill = document.createElement('div');
    pill.className = 'related-pill';
    pill.textContent = relNode.t;
    pill.addEventListener('click', () => {
      const relArc = arcs.find(a => a.node === relNode);
      if (relArc) showDetailPanel(relArc);
    });
    relatedList.appendChild(pill);
  });

  document.getElementById('detail-compass-btn').onclick = () => {
    window.open(`communication-web.html?node=${node.i}`, '_blank');
  };

  detailPanel.classList.add('open');
  hideTooltip();
}

function hideDetailPanel() {
  detailPanel.classList.remove('open');
  selectedArc = null;
  draw();
}

detailClose.addEventListener('click', hideDetailPanel);

// ============================================================
// SEARCH + FILTERS
// ============================================================
const searchInput = document.getElementById('search');
const searchCount = document.getElementById('search-count');

searchInput.addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  updateVisuals();
});

document.querySelectorAll('.filter-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (activeFilters.has(cat)) {
      activeFilters.delete(cat);
      btn.classList.remove('active');
    } else {
      activeFilters.add(cat);
      btn.classList.add('active');
    }
    updateVisuals();
  });
});

function updateVisuals() {
  draw();
  updateStats();
}

// ============================================================
// STATS UPDATE
// ============================================================
function updateStats() {
  const visibleNodes = arcs.filter(a =>
    activeFilters.has(a.node.c) &&
    (!searchTerm || a.node.t.toLowerCase().includes(searchTerm.toLowerCase()))
  );

  const connections = visibleNodes.reduce((sum, arc) => {
    return sum + arc.node.edges.filter(e =>
      visibleNodes.some(va => va.node === e)
    ).length;
  }, 0) / 2; // Divide by 2 because each edge counted twice

  // Animate numbers
  animateValue('stat-total', parseInt(document.getElementById('stat-total').textContent) || 0, N.length, 800);
  animateValue('stat-connected', parseInt(document.getElementById('stat-connected').textContent) || 0, visibleNodes.length, 800);
  animateValue('stat-links', parseInt(document.getElementById('stat-links').textContent) || 0, Math.round(connections), 800);

  // Update search count
  if (searchTerm) {
    searchCount.textContent = `${visibleNodes.length} result${visibleNodes.length === 1 ? '' : 's'}`;
  } else {
    searchCount.textContent = '';
  }

  // Update bottom status
  document.getElementById('status-visible').textContent = `${visibleNodes.length} visible node${visibleNodes.length === 1 ? '' : 's'}`;
  document.getElementById('status-connections').textContent = `${Math.round(connections)} connection${connections === 1 ? '' : 's'}`;

  // Update legend
  document.getElementById('legend-diagnosis').textContent = `Diagnoses: ${groups.diagnosis.length}`;
  document.getElementById('legend-assessment').textContent = `Assessments: ${groups.assessment.length}`;
  document.getElementById('legend-intervention').textContent = `Interventions: ${groups.intervention.length}`;
}

function animateValue(id, start, end, duration) {
  const elem = document.getElementById(id);
  const range = end - start;
  const increment = range / (duration / 16);
  let current = start;

  const timer = setInterval(() => {
    current += increment;
    if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
      current = end;
      clearInterval(timer);
    }
    elem.textContent = Math.round(current);
  }, 16);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    hideDetailPanel();
  } else if (e.key === 'r' || e.key === 'R') {
    // Reset filters
    activeFilters = new Set(['diagnosis', 'assessment', 'intervention']);
    document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.add('active'));
    searchInput.value = '';
    searchTerm = '';
    updateVisuals();
  } else if (e.key === 'f' || e.key === 'F') {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      document.documentElement.requestFullscreen();
    }
  } else if (e.key === '1') {
    document.querySelector('.filter-pill[data-cat="diagnosis"]').click();
  } else if (e.key === '2') {
    document.querySelector('.filter-pill[data-cat="assessment"]').click();
  } else if (e.key === '3') {
    document.querySelector('.filter-pill[data-cat="intervention"]').click();
  }
});

// ============================================================
// LOADING SCREEN
// ============================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    const ld = document.getElementById('loading');
    ld.style.opacity = '0';
    ld.style.pointerEvents = 'none';
    setTimeout(() => { ld.style.display = 'none'; }, 900);
  }, 800);
});

// ============================================================
// INIT
// ============================================================
resizeCanvas();
updateStats();

// Start animation loop for smooth rendering
function animate() {
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
